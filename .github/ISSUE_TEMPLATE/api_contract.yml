name: API contract issue
description: Report or request a narrow `/v1` API contract change.
title: "api: "
labels: [api]
body:
  - type: markdown
    attributes:
      value: |
        Fathom's `/v1` surface is intentionally small and not full OpenAI API parity. Check `docs/api/v1-contract.md`, `docs/api/public-contract.json`, and `docs/api/refusal-boundary-matrix.md` before filing.
  - type: input
    id: endpoint
    attributes:
      label: Endpoint
      placeholder: "GET /v1/health, GET /v1/models, POST /v1/chat/completions, POST /v1/embeddings"
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Request shape
      description: Minimal request, query, or headers. Use synthetic prompts only, and redact credentials, local paths, hostnames, raw logs/artifacts, and private model-store details.
      render: json
    validations:
      required: true
  - type: textarea
    id: response
    attributes:
      label: Expected or actual response shape
      description: Share only the smallest public-safe response shape. Redact credentials, local paths, hostnames, raw logs/artifacts, and private model-store details.
      render: json
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and artifact check
      options:
        - label: I used synthetic prompts only and removed private prompts or documents.
          required: true
        - label: I removed credentials, auth headers, tokens, and secrets.
          required: true
        - label: I removed absolute local paths, hostnames, usernames, and model-store details.
          required: true
        - label: I reviewed attached logs/artifacts/screenshots for sensitive data and ran a risk scan when applicable.
          required: true
  - type: input
    id: client
    attributes:
      label: Client or integration
      placeholder: "curl, OpenAI SDK version, local app integration"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Contract notes
      description: Explain the mismatch with docs/api/v1-contract.md or the narrow behavior you need.
    validations:
      required: true
