name: Bug report
description: Report a reproducible issue without sharing private local data.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for keeping reports small and public-safe. Use synthetic prompts and share-safe fixtures when possible. Remove private prompts, credentials, auth headers, private documents, local paths, hostnames, usernames, and model-store details before posting. Review raw logs/artifacts and run `bash scripts/public_risk_scan.sh` before sharing larger output.
  - type: input
    id: os
    attributes:
      label: OS
      description: OS name/version and CPU architecture, if relevant.
      placeholder: "macOS 15 arm64, Ubuntu 24.04 x86_64, Windows 11"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: "commit SHA, tag, or release version"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or action
      description: The exact command, endpoint, or UI action. Redact private paths and hostnames.
      render: shell
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Endpoint or UI area
      placeholder: "/v1/chat/completions, /v1/models, model library, install flow"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Smallest reproduction
      description: Minimal steps or request shape. Use synthetic prompts and share-safe fixture/model identifiers when possible; do not paste private documents or raw sensitive artifacts.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and artifact check
      options:
        - label: I removed private prompts, documents, and credentials.
          required: true
        - label: I removed absolute local paths, hostnames, usernames, and model-store details.
          required: true
        - label: I reviewed attached logs/artifacts/screenshots for sensitive data and ran a risk scan when applicable.
          required: true
        - label: I used synthetic prompts/share-safe fixtures or explained why the reproduction cannot be reduced further.
          required: true
