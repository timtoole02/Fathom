name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run tests
        run: cargo test -q
      - name: Run public API contract smoke
        run: bash scripts/public_api_contract_smoke.sh

  frontend:
    name: Frontend gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm --prefix frontend ci
      - name: Build frontend
        run: npm --prefix frontend run build
      - name: Run UI copy QA
        run: npm --prefix frontend run qa:copy

  static-safety:
    name: Static safety gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check shell script syntax
        run: |
          bash -n examples/api/curl-quickstart.sh
          bash -n scripts/public_risk_scan.sh
          bash -n scripts/public_api_contract_smoke.sh
          bash -n scripts/backend_acceptance_smoke.sh
          bash -n scripts/smoke.sh
          bash -n scripts/start-backend.sh
          bash -n scripts/start.sh
          bash -n scripts/stop.sh
      - name: Check Python syntax
        run: |
          python3 -m py_compile \
            scripts/api_client_examples_regression.py \
            scripts/backend_acceptance_artifact_qa.py \
            scripts/ci_static_policy.py \
            scripts/public_api_contract_qa.py \
            scripts/public_contract_smoke_artifact_qa.py \
            examples/api/python-no-deps.py \
            examples/api/openai-sdk.py \
            scripts/bench_backend.py
      - name: Run API client example regression
        run: python3 scripts/api_client_examples_regression.py
      - name: Run public API contract QA
        run: python3 scripts/public_api_contract_qa.py
      - name: Run public contract smoke artifact QA
        run: python3 scripts/public_contract_smoke_artifact_qa.py
      - name: Run backend acceptance artifact QA
        run: python3 scripts/backend_acceptance_artifact_qa.py
      - name: Run CI static policy
        run: python3 scripts/ci_static_policy.py
      - name: Run public risk scan self-test
        run: bash scripts/public_risk_scan.sh --self-test
      - name: Run public risk scan
        run: bash scripts/public_risk_scan.sh
